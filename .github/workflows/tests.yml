name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      # app/db.py creates its SQLAlchemy engine at import time — never actually
      # connected to in these tests (they use their own in-memory SQLite, or
      # mock DB access entirely), but create_engine() needs a syntactically
      # valid URL just to parse without raising. No test file imported app.db
      # eagerly until tests/test_trend_historian.py did, which is what
      # surfaced this — see run #17 onward.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v
