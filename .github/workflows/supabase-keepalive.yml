name: Supabase Keepalive

on:
  schedule:
    - cron: "0 9 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase database (keeps free-tier project awake)
        run: |
          # /auth/v1/health does NOT count as database activity for Supabase's
          # free-tier auto-pause — it never touches Postgres. Query a real table
          # via PostgREST instead so this actually resets the inactivity timer.
          STATUS=$(curl -sS -o /tmp/keepalive_response.json -w "%{http_code}" --max-time 15 \
            "https://rhndbjnvpdhckzodevse.supabase.co/rest/v1/trends?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase DB query returned HTTP $STATUS"
          cat /tmp/keepalive_response.json
          if [ "$STATUS" -ge 400 ]; then
            echo "::error::Supabase keepalive query failed with HTTP $STATUS"
            exit 1
          fi
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
