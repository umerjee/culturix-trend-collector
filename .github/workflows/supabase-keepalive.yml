name: Supabase Keepalive

on:
  schedule:
    - cron: "0 9 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase project
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://rhndbjnvpdhckzodevse.supabase.co/auth/v1/health" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase auth health check returned HTTP $STATUS"
          if [ "$STATUS" -ge 400 ]; then
            echo "::error::Supabase keepalive ping failed with HTTP $STATUS"
            exit 1
          fi
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
