[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# ── Railway Cron Services ─────────────────────────────────────────────────────
# Create 3 additional Cron services in Railway dashboard pointing at this repo:
#
# Tier 1 — Signal Crawl (every 2 hours)
#   Schedule:  0 */2 * * *
#   Command:   python -m app.collectors.orchestrator
#
# Tier 2 — Embed + Cluster (every 4 hours)
#   Schedule:  0 */4 * * *
#   Command:   python -c "from app.embedding_processor import process_embeddings; from app.clustering_service import run_clustering; process_embeddings(500); run_clustering(500, min_cluster_size=2)"
#
# Tier 3 — Persona Mapping (every 6 hours)
#   Schedule:  0 */6 * * *
#   Command:   python -c "from app.personas import generate_clustered_personas; generate_clustered_personas()"
#
# Tier 4 — Digest Generation (daily at 06:00 UTC, so users get it by 07:00)
#   Schedule:  0 6 * * *
#   Command:   python -m app.pipeline.graph
