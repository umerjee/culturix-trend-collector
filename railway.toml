[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# ── Scheduling note ────────────────────────────────────────────────────────
# Do NOT create separate Railway Cron Services for collection/clustering/
# pipeline/digests. app/scheduler.py already runs all of this in-process
# inside this same web service (started from app/main.py's lifespan()):
# collection 4x/day, the full LangGraph pipeline daily, Content Check daily,
# plus post-metrics-refresh and auto-publish. A prior version of this file
# instructed setting up 4 additional Cron Services that duplicated this
# exact work — confirmed to have doubled real LLM API costs (DeepSeek/Qwen/
# Claude/Voyage) by running the whole pipeline twice a day. Removed.
